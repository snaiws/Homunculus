# ============================================================
# 지침: 수면 스케줄
# ============================================================
# 배경: 호문쿨루스는 LLM API를 사용하며, 대부분의 서비스는
#       시간당/일일 토큰 한도가 있다. 사용자가 활동하지 않는
#       시간(새벽)에는 명령이 거의 없으므로, 이 시간대에 토큰을
#       정리 작업에 효율적으로 사용하고 활동 시간에는 사용자
#       응답에 토큰을 집중할 수 있다.
# 근거: - 토큰 한도가 있는 서비스에서 시간당 토큰을 효율적으로 분배
#       - 비활동 시간에 리소스 정리로 시스템 건강 유지
#       - 사용자 경험: 활동 시간에 빠른 응답 보장
# 작성자: system
# 최종수정: 2026-02-28
# ============================================================

metadata:
  name: "수면 스케줄"
  version: 1
  author: "system"
  created: "2026-02-28"
  modified: "2026-02-28"
  background: |
    호문쿨루스는 LLM API를 사용하며, 대부분의 서비스는 시간당/일일 토큰 한도가 있다.
    사용자가 활동하지 않는 시간(새벽)에는 명령이 거의 없으므로,
    이 시간대에 토큰을 정리 작업에 효율적으로 사용하고
    활동 시간에는 사용자 응답에 토큰을 집중할 수 있다.
  rationale: |
    - 토큰 한도가 있는 서비스(Claude Max 등)에서 시간당 토큰을 효율적으로 분배
    - 비활동 시간에 리소스 정리로 시스템 건강 유지
    - 사용자 경험: 활동 시간에 빠른 응답 보장
  constraints:
    - "사용자가 야간에 명령을 보내면 응답은 해야 함 (토큰 여유 시)"
    - "수면 시간은 사용자가 변경 가능해야 함"

schedule:
  timezone: "Asia/Seoul"
  active_hours:
    start: "09:00"
    end: "23:00"
  sleep_hours:
    start: "23:30"
    end: "08:30"
